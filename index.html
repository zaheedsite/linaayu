/* ===== HOOKS ===== */
function useAnim(threshold=.07){
    const r=useRef(null),[v,setV]=useState(false);
    useEffect(()=>{const e=r.current;if(!e)return;const o=new IntersectionObserver(([n])=>{if(n.isIntersecting){setV(true);o.unobserve(e)}},{threshold,rootMargin:'0px 0px -30px 0px'});o.observe(e);return()=>o.disconnect()},[threshold]);
    return[r,v];
}
function useCD(){
    const t=useMemo(()=>{const d=new Date();d.setHours(d.getHours()+5,d.getMinutes()+47,d.getSeconds()+33);return d.getTime()},[]);
    const[l,setL]=useState({h:5,m:47,s:33});
    useEffect(()=>{const f=()=>{const d=Math.max(0,t-Date.now());setL({h:Math.floor(d/36e5),m:Math.floor(d/6e4%60),s:Math.floor(d/1e3%60)})};f();const i=setInterval(f,1000);return()=>clearInterval(i)},[t]);
    return l;
}
function useSticky(){
    const[s,setS]=useState(false);
    useEffect(()=>{const h=()=>{const y=window.scrollY,dh=document.documentElement.scrollHeight,wh=window.innerHeight;setS(y>550&&y<dh-wh-250)};window.addEventListener('scroll',h,{passive:true});return()=>window.removeEventListener('scroll',h)},[]);
    return s;
}

function LivePopup(){
    const[popup,setPopup]=useState(null);
    const[exiting,setExiting]=useState(false);
    const show=useCallback(()=>{
        const o=orders[Math.floor(Math.random()*orders.length)];
        setPopup(o);setExiting(false);
        const h=setTimeout(()=>{setExiting(true);setTimeout(()=>{setPopup(null);setExiting(false)},400)},4000);
        return()=>clearTimeout(h);
    },[]);
    useEffect(()=>{
        const f=setTimeout(show,7000);
        const i=setInterval(show,13000+Math.random()*7000);
        return()=>{clearTimeout(f);clearInterval(i)};
    },[show]);
    if(!popup)return null;
    return <div className={`fixed bottom-28 md:bottom-8 left-5 z-50 max-w-[270px] ${exiting?'popup-out':'popup-in'}`}>
        <div className="bg-white rounded-2xl shadow-xl shadow-black/8 p-3.5 border border-blush-100/60 flex items-center gap-3">

}
